<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — หน้าไม่พบ | AI Coding Adventure</title>
  <link rel="icon" href="/AI-Coding-Adventure-Learning-Platform/assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/AI-Coding-Adventure-Learning-Platform/manifest.json">
  <meta name="theme-color" content="#2563EB">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .code { font-size: clamp(5rem, 20vw, 8rem); font-weight: 900; color: #2563EB; line-height: 1; }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 .5rem; }
    p  { color: #94A3B8; margin-bottom: 2rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      background: #2563EB; color: white; text-decoration: none;
      padding: .75rem 1.75rem; border-radius: .75rem;
      font-weight: 600; font-size: 1rem;
      transition: background .2s;
    }
    .btn:hover { background: #1D4ED8; }
  </style>
</head>
<body>
  <div class="wrap" role="main">
    <div class="code" aria-hidden="true">404</div>
    <h1>ไม่พบหน้าที่ต้องการ</h1>
    <p>หน้าที่คุณกำลังมองหาอาจถูกย้าย เปลี่ยนชื่อ หรือไม่มีอยู่แล้ว</p>
    <a href="/AI-Coding-Adventure-Learning-Platform/" class="btn">
      <span aria-hidden="true">←</span> กลับหน้าหลัก
    </a>
  </div>
  <script>
    /* GitHub Pages SPA redirect — restore path after redirect from 404 */
    (function () {
      var q = window.location.search;
      if (q && q[1] === '/') {
        var decoded = q.slice(1).split('&').map(function (s) { return s.replace(/~and~/g, '&'); }).join('?');
        window.history.replaceState(null, null, decoded + window.location.hash);
      }
    })();
  </script>
</body>
</html>
